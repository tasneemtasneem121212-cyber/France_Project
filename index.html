<!DOCTYPE html>
<html>
<head>
    <title>مشروع خرائط فرنسا - تسنيم</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 650px; width: 100%; border-radius: 15px; }
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .leaflet-tooltip.my-label {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #333;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">خريطة فرنسا التفاعلية - الطبقات النهائية</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([46.2276, 2.2137], 6); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // وظيفة التنسيق: سنجعل التعبئة غير شفافة تماماً (1.0)
        function getStyle(fileName) {
            return {
                color: "#2c3e50",     // لون الحدود
                weight: 2,
                fillColor: "#3498db", // اللون الأزرق
                fillOpacity: 1.0,     // القيمة 1 تعني لا يوجد شفافية نهائياً
                opacity: 1
            };
        }

        var files = ['fr.geojson', 'france.geojson', 'franceregion.geojson', 'marksfrance.geojson'];

        files.forEach(function(fileName) {
            fetch(fileName)
                .then(res => res.json())
                .then(data => {
                    L.geoJSON(data, {
                        style: getStyle(fileName),
                        pointToLayer: function (feature, latlng) {
                            return L.circleMarker(latlng, { radius: 6, fillColor: "#e67e22", color: "#000", weight: 1, fillOpacity: 1 });
                        },
                        onEachFeature: function (feature, layer) {
                            var name = feature.properties.NAME_1 || feature.properties.name || "";
                            if (name) {
                                layer.bindTooltip(name, { permanent: true, direction: "center", className: "my-label" });
                            }
                        }
                    }).addTo(map);
                });
        });
    </script>
</body>
</html>
