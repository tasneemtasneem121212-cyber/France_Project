<!DOCTYPE html>
<html>
<head>
    <title>مشروع خرائط فرنسا - تسنيم</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style> #map { height: 600px; width: 100%; } </style>
</head>
<body>
    <h2 style="text-align:center;">خريطة فرنسا التفاعلية - مشروع الجيوماتكس</h2>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([46.2276, 2.2137], 6); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // دمج ملفاتك التفاعلية
        var files = ['fr.geojson', 'france.geojson', 'franceregion.geojson', 'marksfrance.geojson'];
        
        files.forEach(function(file) {
            fetch(file)
                .then(res => res.json())
                .then(data => {
                    L.geoJSON(data, {
                        style: function() { return {color: "blue", weight: 2}; }
                    }).addTo(map);
                });
        });
    </script>
</body>
</html>
