<!DOCTYPE html>
<html>
<head>
    <title>خريطة فرنسا التفاعلية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 10px; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">مشروع تحليل خرائط فرنسا - الجيوماتكس</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة والمركز
        var map = L.map('map').setView([46.2276, 2.2137], 6); 

        // إضافة خريطة الأساس (يمكنك تغيير شكلها من هنا)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // وظيفة لتنسيق شكل النقاط (التي كانت زرقاء)
        var geojsonMarkerOptions = {
            radius: 6,
            fillColor: "#e67e22", // لون برتقالي للنقاط
            color: "#000",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8
        };

        // قائمة الملفات التي رفعتِها
        var layers = [
            { name: 'fr.geojson', color: '#2980b9' },      // لون حدود فرنسا
            { name: 'franceregion.geojson', color: '#8e44ad' }, // لون المناطق
            { name: 'marksfrance.geojson', isPoint: true }  // النقاط (المعالم)
        ];

        layers.forEach(function(layerConfig) {
            fetch(layerConfig.name)
                .then(res => res.json())
                .then(data => {
                    L.geoJSON(data, {
                        // تنسيق المضلعات (الحدود)
                        style: function() {
                            return {
                                color: layerConfig.color || "#333",
                                weight: 2,
                                fillOpacity: 0.1
                            };
                        },
                        // تنسيق النقاط (المعالم)
                        pointToLayer: function (feature, latlng) {
                            if (layerConfig.isPoint) {
                                return L.circleMarker(latlng, geojsonMarkerOptions);
                            }
                        },
                        // إضافة ميزة ظهور الاسم عند الضغط
                        onEachFeature: function (feature, layer) {
                            if (feature.properties && feature.properties.NAME_1) {
                                layer.bindPopup("المنطقة: " + feature.properties.NAME_1);
                            } else if (feature.properties && feature.properties.name) {
                                layer.bindPopup("المعلم: " + feature.properties.name);
                            }
                        }
                    }).addTo(map);
                });
        });
    </script>
</body>
</html>
